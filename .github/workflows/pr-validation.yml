name: PR Validation

on:
  pull_request:
    branches: [develop, main]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/pr-validation.yml@v1.33.0
    with:
      enforce_source_branches: true
      allowed_source_branches: 'develop|hotfix/*'
      target_branches_for_source_check: 'main'
      pr_title_scopes: |
        consul
        core
        config
        demo
        ci
        deps
        docs
        security
        tests
    secrets: inherit
