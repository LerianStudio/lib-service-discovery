name: Go Combined Analysis

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

jobs:
  go-analysis:
    name: Go Analysis
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/go-pr-analysis.yml@v1.33.0
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      security-events: write
    with:
      go_version: "1.26.3"
      golangci_lint_version: "v2.12.2"
      coverage_threshold: 80
      fail_on_coverage_threshold: true
      go_private_modules: "github.com/LerianStudio/*"
    secrets: inherit
