name: PR Security Scan

on:
  pull_request:
    branches: [develop, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  actions: read
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

jobs:
  security:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/pr-security-scan.yml@v1.33.0
    with:
      enable_docker_scan: false
    secrets: inherit
